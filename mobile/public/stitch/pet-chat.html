<style>
        body { background-color: theme('colors.background'); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .bubble-ai { border-radius: 16px 16px 16px 4px; }
        .bubble-user { border-radius: 16px 16px 4px 16px; }
        
        @keyframes typing {
            0%, 100% { transform: translateY(0); opacity: 0.5; }
            50% { transform: translateY(-4px); opacity: 1; }
        }
        .typing-dot { animation: typing 1.4s infinite ease-in-out; }
        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    </style>

<body class="font-body-md text-on-surface h-screen flex flex-col overflow-hidden">
<!-- Top App Bar -->
<header class="flex-none backdrop-blur-xl bg-background/80 flex justify-between items-center px-margin-mobile h-16 w-full sticky top-0 z-50">

<div class="flex items-center gap-2">
<div class="w-8 h-8 rounded-full overflow-hidden border-2 border-surface-container">

<div class="flex items-center gap-1">
<div class="w-2 h-2 rounded-full bg-soft-teal"></div>
<span class="font-label-sm text-label-sm text-bark-gray">&#x5f00;&#x5fc3;</span>
</div>
</div>
</div>
</div>
<button aria-label="Settings" class="text-primary p-2 -mr-2 rounded-full hover:bg-surface-container transition-colors scale-95 active:scale-90">
<span class="material-symbols-outlined">more_vert</span>
</button>
</header>
<!-- Chat Body -->
<main class="flex-1 overflow-y-auto px-margin-mobile py-4 flex flex-col gap-6 hide-scrollbar relative">
<!-- Safety Notice -->
<div class="bg-surface-container-low rounded-lg p-3 text-center border border-outline-variant/30 max-w-sm mx-auto shadow-[0px_4px_20px_rgba(74,69,66,0.05)]">
<p class="font-label-sm text-label-sm text-bark-gray flex items-center justify-center gap-1">
<span class="material-symbols-outlined text-soft-teal" style="font-size: 16px;">info</span>
                注意：AI 健康建议不能替代专业的兽医诊断。
            </p>
</div>
<!-- AI Message -->
<div class="flex items-start gap-3 max-w-[85%]">
<div class="w-8 h-8 rounded-full overflow-hidden flex-shrink-0 mt-1 shadow-[0px_4px_20px_rgba(74,69,66,0.05)]">
<img alt="Mochi" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida/ADBb0uimVPuenXN93cfkShpzu66CkAtJlfRD8NC5-Hr6pXWI4MNuYMa3f9tt1xbdp1k3YwB0QNSTZ1zO5U2SrLpFc8p1WTj9IgwZ4ryMF9hUTnilnSARj_SOgaJhfWCZyHsHbFv832Rn66LDHp8KaCUVhZTanvLo6IqQUXvDS1kTjvgIgfLVIAkWwFUHk6w22Ot1iG8-3DyvOmMSkvhZssrgNjtxEyhrCV30YI4x2TVI5LxkcOtmAdkSLHT4tUQ8"/>

<p class="font-body-md text-body-md text-on-surface">你好！我是 Mochi，你的数字伴侣。今天过得怎么样？</p>
</div>
</div>
<!-- User Message -->
<div class="flex items-start justify-end gap-3 max-w-[85%] self-end">
<div class="bg-warm-orange bubble-user p-4 shadow-[0px_8px_24px_rgba(255,138,92,0.15)]">
<p class="font-body-md text-body-md text-on-primary">我觉得有点累。</p>
</div>
</div>
<!-- AI Message -->
<div class="flex items-start gap-3 max-w-[85%]">
<div class="w-8 h-8 rounded-full overflow-hidden flex-shrink-0 mt-1 shadow-[0px_4px_20px_rgba(74,69,66,0.05)]">
<img alt="Mochi" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida/ADBb0uimVPuenXN93cfkShpzu66CkAtJlfRD8NC5-Hr6pXWI4MNuYMa3f9tt1xbdp1k3YwB0QNSTZ1zO5U2SrLpFc8p1WTj9IgwZ4ryMF9hUTnilnSARj_SOgaJhfWCZyHsHbFv832Rn66LDHp8KaCUVhZTanvLo6IqQUXvDS1kTjvgIgfLVIAkWwFUHk6w22Ot1iG8-3DyvOmMSkvhZssrgNjtxEyhrCV30YI4x2TVI5LxkcOtmAdkSLHT4tUQ8"/>
</div>
<div class="bg-surface-container-high bubble-ai p-4 shadow-[0px_4px_20px_rgba(74,69,66,0.05)]">
<p class="font-body-md text-body-md text-on-surface">哦不，也许我们可以休息一下？或者我可以给你讲个有趣的故事！</p>
</div>
</div>
<!-- Typing Indicator -->
<div class="flex items-start gap-3 max-w-[85%]">
<div class="w-8 h-8 rounded-full overflow-hidden flex-shrink-0 mt-1 opacity-70">
<img alt="Mochi" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida/ADBb0uimVPuenXN93cfkShpzu66CkAtJlfRD8NC5-Hr6pXWI4MNuYMa3f9tt1xbdp1k3YwB0QNSTZ1zO5U2SrLpFc8p1WTj9IgwZ4ryMF9hUTnilnSARj_SOgaJhfWCZyHsHbFv832Rn66LDHp8KaCUVhZTanvLo6IqQUXvDS1kTjvgIgfLVIAkWwFUHk6w22Ot1iG8-3DyvOmMSkvhZssrgNjtxEyhrCV30YI4x2TVI5LxkcOtmAdkSLHT4tUQ8"/>
</div>
<div class="bg-surface-container-high bubble-ai px-4 py-3 shadow-[0px_4px_20px_rgba(74,69,66,0.05)] flex items-center h-[48px]">

<div class="w-2 h-2 rounded-full bg-bark-gray typing-dot"></div>
<div class="w-2 h-2 rounded-full bg-bark-gray typing-dot"></div>

<button class="whitespace-nowrap bg-surface-container-low border border-outline-variant/50 font-label-sm text-label-sm text-bark-gray px-4 py-1.5 rounded-full hover:bg-surface-container transition-colors">今天吃什么？</button>
<button class="whitespace-nowrap bg-surface-container-low border border-outline-variant/50 font-label-sm text-label-sm text-bark-gray px-4 py-1.5 rounded-full hover:bg-surface-container transition-colors">健康提醒</button>
<button class="whitespace-nowrap bg-surface-container-low border border-outline-variant/50 font-label-sm text-label-sm text-bark-gray px-4 py-1.5 rounded-full hover:bg-surface-container transition-colors">陪我聊天</button>
<button class="whitespace-nowrap bg-surface-container-low border border-outline-variant/50 font-label-sm text-label-sm text-bark-gray px-4 py-1.5 rounded-full hover:bg-surface-container transition-colors">生成日常笔记</button>
</div>
<!-- Input Bar -->
<div class="px-margin-mobile pb-4 flex items-end gap-2">
<div class="flex-1 bg-surface-container-low rounded-xl border border-outline-variant/30 flex items-center px-2 py-1 focus-within:border-soft-teal focus-within:ring-1 focus-within:ring-soft-teal transition-all min-h-[48px]">
<button class="p-2 text-bark-gray hover:text-primary transition-colors">
<span class="material-symbols-outlined">mic</span>
</button>
<textarea class="flex-1 bg-transparent border-none focus:ring-0 resize-none font-body-md text-body-md text-on-surface placeholder-bark-gray/60 py-2.5 max-h-[120px] hide-scrollbar" placeholder="输入消息..." rows="1"></textarea>
<button class="p-2 text-bark-gray hover:text-primary transition-colors">
<span class="material-symbols-outlined">add_circle</span>
</button>
</div>
<button class="w-12 h-12 rounded-xl bg-warm-orange flex items-center justify-center text-on-primary shadow-[0px_8px_24px_rgba(255,138,92,0.15)] scale-98 active:scale-95 transition-all flex-shrink-0">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</div>
</div>
<script>
        // Auto-resize textarea
        const textarea = document.querySelector('textarea');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
    </script>
