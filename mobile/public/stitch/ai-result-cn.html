<script>
        function createConfetti() {
            const colors = ['#FF8A5C', '#4DB6AC', '#FFD966', '#8bf1e6'];
            for (let i = 0; i < 50; i++) {
                let confetto = document.createElement('div');
                confetto.classList.add('confetti');
                confetto.style.left = Math.random() * 100 + 'vw';
                confetto.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetto.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confetto.style.animationDelay = Math.random() * 2 + 's';
                
                // Random shapes
                if (Math.random() > 0.5) {
                    confetto.style.borderRadius = '50%';
                }
                
                document.body.appendChild(confetto);
                
                setTimeout(() => {
                    confetto.remove();
                }, 5000);
            }
        }

        function toggleState(state) {
            const successEl = document.getElementById('state-success');
            const failureEl = document.getElementById('state-failure');
            const btnSuccess = document.getElementById('btn-success');
            const btnFailure = document.getElementById('btn-failure');

            if (state === 'success') {
                failureEl.classList.add('hidden', 'opacity-0');
                successEl.classList.remove('hidden');
                setTimeout(() => successEl.classList.remove('opacity-0'), 50);
                
                btnSuccess.classList.add('bg-white', 'shadow-sm');
                btnSuccess.classList.remove('text-bark-gray', 'hover:bg-white/50');
                btnFailure.classList.remove('bg-white', 'shadow-sm');
                btnFailure.classList.add('text-bark-gray', 'hover:bg-white/50');
                
                createConfetti();
            } else {
                successEl.classList.add('hidden', 'opacity-0');
                failureEl.classList.remove('hidden');
                setTimeout(() => failureEl.classList.remove('opacity-0'), 50);
                
                btnFailure.classList.add('bg-white', 'shadow-sm');
                btnFailure.classList.remove('text-bark-gray', 'hover:bg-white/50');
                btnSuccess.classList.remove('bg-white', 'shadow-sm');
                btnSuccess.classList.add('text-bark-gray', 'hover:bg-white/50');
            }
        }

        // Init confetti on load
        window.onload = () => {
            setTimeout(createConfetti, 500);
        };
    </script>
