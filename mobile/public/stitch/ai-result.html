<!-- Main Content Canvas -->
<main class="pt-24 px-margin-mobile md:px-margin-desktop max-w-screen-md mx-auto min-h-screen flex flex-col gap-6">
<!-- Header Text -->

<p class="font-body-lg text-body-lg text-outline">请选择最喜欢的一张，或者调整风格重新生成。</p>
</div>
<!-- Style Switcher (Glassmorphism Pill) -->
<div class="flex justify-center">
<div class="inline-flex bg-surface-container-high rounded-full p-1 shadow-level-1">
<button class="px-6 py-2 rounded-full font-label-md text-label-md bg-white text-bark-gray shadow-sm transition-all">
                    手绘风
                </button>
<button class="px-6 py-2 rounded-full font-label-md text-label-md text-outline hover:text-bark-gray transition-all">
                    3D 写实
                </button>
<button class="px-6 py-2 rounded-full font-label-md text-label-md text-outline hover:text-bark-gray transition-all">
                    扁平插画

</div>
</div>
<!-- Candidate Carousel (Bento-ish horizontal scroll on mobile, grid on desktop) -->
<div class="relative w-full">
<div class="flex overflow-x-auto hide-scrollbar gap-4 snap-x snap-mandatory pb-4" id="imageCarousel">
<!-- Candidate 1 -->

<img alt="Golden Retriever avatar candidate" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida/ADBb0uijnc-DVlrxrGnaPKIMEsymr3GUC83kw2qoePmRsFM26HlmhpJu8YcJlp-X2PWAwvUxYJ8H1g7p-YlgSmAfweH3DEW54P8WWH78hff20-gQsRTGD4kzFSrMlZ_ppYvemOKYBjAhoH-vH_a5WeKJeWfNIZYE2ci_J6MBW_WZ3Ha5vaZMSSYgJrFPDAnVvDKJUtK2bS5MiFIDjAzyhXFYjljG2_M_-scNhMqXblmFzKpEKc10ST-efcPqiWhm"/>
<!-- Active State Overlay -->

<div class="bg-white rounded-full p-2 shadow-level-2 transform scale-50 group-hover:scale-100 transition-transform">
<span class="material-symbols-outlined text-warm-orange" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<!-- Similarity Badge -->
<div class="absolute top-4 left-4 bg-white/90 backdrop-blur-sm px-3 py-1 rounded-full font-label-sm text-label-sm text-soft-teal flex items-center gap-1 shadow-sm">

            </button>

<script>
        function selectImage(element) {
            // Reset all borders and overlays
            const allImages = document.querySelectorAll('#imageCarousel > div > div');
            allImages.forEach(img => {
                img.classList.remove('border-warm-orange');
                img.classList.add('border-transparent');
                
                const overlay = img.querySelector('.bg-warm-orange\\/10');
                if(overlay) overlay.classList.remove('opacity-100');
                
                const iconContainer = img.querySelector('.bg-white.rounded-full.p-2');
                if(iconContainer) iconContainer.classList.remove('scale-100');
            });

            // Set active state on clicked
            element.classList.remove('border-transparent');
            element.classList.add('border-warm-orange');
            
            const activeOverlay = element.querySelector('.bg-warm-orange\\/10');
            if(activeOverlay) activeOverlay.classList.add('opacity-100');
            
            const activeIconContainer = element.querySelector('.bg-white.rounded-full.p-2');
            if(activeIconContainer) activeIconContainer.classList.add('scale-100');
        }
    </script>
