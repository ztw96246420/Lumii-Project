<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Level 1 Custom Shadow per guidelines */
        .shadow-level-1 {
            box-shadow: 0px 4px 20px rgba(74, 69, 66, 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col overflow-x-hidden selection:bg-warm-orange selection:text-white">
<!-- Sub-page Header: Suppressing standard TopAppBar for Task-Focused Screen -->
<header class="flex justify-between items-center px-margin-mobile h-16 w-full max-w-7xl mx-auto sticky top-0 z-50 bg-background/90 backdrop-blur-xl">
<button class="w-10 h-10 flex items-center justify-center rounded-full text-bark-gray hover:bg-surface-container transition-colors active:scale-95">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">发布今日小事</h1>
<div class="w-10 h-10"></div> <!-- Balancer for centering title -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-margin-mobile py-4 w-full max-w-2xl mx-auto flex flex-col gap-6">
<!-- Photo Upload Area: Prominent, Organic -->
<div class="relative w-full aspect-square md:aspect-[4/3] rounded-[24px] bg-surface-container-low border-2 border-dashed border-outline-variant/60 flex flex-col items-center justify-center cursor-pointer overflow-hidden group transition-all duration-300 hover:border-warm-orange/50 hover:bg-surface-container active:scale-[0.98]">
<div class="flex flex-col items-center gap-3 text-bark-gray group-hover:text-warm-orange transition-colors duration-300 z-10">
<div class="w-16 h-16 rounded-full bg-surface-bright flex items-center justify-center shadow-level-1 mb-2">
<span class="material-symbols-outlined text-3xl icon-filled">add_a_photo</span>
</div>
<span class="font-label-md text-label-md">添加照片</span>
<span class="font-label-sm text-label-sm text-outline">记录美好瞬间</span>
</div>
<!-- Subtle background decorative blob to make it less sterile -->
<div class="absolute -bottom-10 -right-10 w-40 h-40 bg-warm-orange/5 rounded-full blur-2xl group-hover:bg-warm-orange/10 transition-colors duration-500"></div>
<div class="absolute -top-10 -left-10 w-32 h-32 bg-soft-teal/5 rounded-full blur-2xl group-hover:bg-soft-teal/10 transition-colors duration-500"></div>
</div>
<!-- Text Input Area: Tactile, slightly darker background -->
<div class="bg-surface-container rounded-[20px] p-5 shadow-level-1 flex flex-col gap-3 focus-within:ring-2 focus-within:ring-soft-teal focus-within:bg-surface-bright transition-all duration-300">
<textarea class="w-full bg-transparent resize-none border-none outline-none text-on-surface placeholder:text-outline font-body-lg text-body-lg min-h-[120px] p-0 focus:ring-0" placeholder="记录 TA 的有趣瞬间..."></textarea>
<div class="flex items-center justify-between mt-2 pt-3 border-t border-outline-variant/30">
<div class="flex gap-2">
<button class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-surface-bright text-bark-gray font-label-sm text-label-sm border border-outline-variant/50 hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-[18px]">location_on</span>
                        添加位置
                    </button>
<button class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-surface-bright text-bark-gray font-label-sm text-label-sm border border-outline-variant/50 hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-[18px]">sell</span>
                        标签
                    </button>
</div>
<span class="font-label-sm text-label-sm text-outline">0 / 200</span>
</div>
</div>
</main>
<!-- Bottom Action Area -->
<div class="px-margin-mobile pb-8 pt-4 w-full max-w-2xl mx-auto bg-background">
<!-- Primary Action Button: Warm Orange, Pill-shaped, Tactile feedback -->
<button class="w-full h-14 bg-warm-orange text-white rounded-full flex items-center justify-center gap-2 font-label-md text-label-md shadow-[0px_8px_24px_rgba(255,138,92,0.25)] hover:bg-[#ff7a45] active:scale-[0.98] transition-all duration-200">
            发布
            <span class="material-symbols-outlined icon-filled text-xl">send</span>
</button>
</div>
<!-- Script to auto-resize textarea nicely -->
<script>
        const textarea = document.querySelector('textarea');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
    </script>
</body></html>
