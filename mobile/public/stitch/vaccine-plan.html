<!-- Lightweight interaction script for the toggle -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggle = document.getElementById('reminderToggle');
            const toggleKnob = toggle.querySelector('span');
            let isToggled = true;

            toggle.addEventListener('click', () => {
                isToggled = !isToggled;
                toggle.setAttribute('aria-pressed', isToggled);
                
                if (isToggled) {
                    toggle.classList.remove('bg-surface-dim');
                    toggle.classList.add('bg-warm-orange');
                    toggleKnob.classList.remove('-translate-x-6');
                    toggleKnob.classList.add('translate-x-0');
                } else {
                    toggle.classList.remove('bg-warm-orange');
                    toggle.classList.add('bg-surface-dim');
                    toggleKnob.classList.remove('translate-x-0');
                    toggleKnob.classList.add('-translate-x-6');
                }
            });
        });
    </script>
