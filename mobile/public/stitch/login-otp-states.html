<style>
        body {
            background-color: #fbf9f4; /* background */
            color: #1b1c19; /* on-background */
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .otp-input {
            caret-color: #9f4119; /* primary */
        }
        .otp-input:focus {
            outline: none;
            border-color: #4DB6AC; /* soft-teal */
            box-shadow: 0 0 0 2px rgba(77, 182, 172, 0.2);
        }
        .otp-error {
            border-color: #ba1a1a !important; /* error */
            color: #ba1a1a !important;
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        
        /* Keyboard Styles */
        .keyboard-key {
            background-color: #ffffff;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            transition: background-color 0.1s;
        }
        .keyboard-key:active {
            background-color: #e4e2dd; /* surface-variant */
            transform: scale(0.95);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="antialiased min-h-screen flex flex-col items-center justify-center bg-background md:p-8">
<!-- Mobile Container Wrapper -->
<div class="w-full max-w-md h-[884px] md:h-auto md:min-h-[800px] bg-bone-white md:rounded-3xl shadow-[0_4px_20px_rgba(74,69,66,0.05)] relative overflow-hidden flex flex-col">
<!-- Top App Bar (Simplified for Transactional Screen) -->
<header class="flex justify-between items-center px-margin-mobile h-16 w-full z-50 bg-transparent">
<button class="p-2 -ml-2 text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="w-8"></div> <!-- Spacer for center alignment -->
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col px-margin-mobile pt-8 pb-32 overflow-y-auto">
<div class="mb-12">
<h1 class="font-headline-xl text-headline-xl text-on-surface mb-2">输入验证码</h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                    验证码已发送至 +86 138****8888
                </p>
</div>
<!-- OTP Input Container (Error State Example) -->
<div class="mb-8">
<div class="flex justify-between gap-2 mb-2" id="otp-container">
<input class="w-12 h-14 text-center font-headline-lg text-headline-lg rounded-xl bg-surface-container-high border-2 border-transparent text-on-surface otp-input focus:border-soft-teal transition-colors" inputmode="numeric" maxlength="1" pattern="[0-9]*" readonly="" type="text" value="1"/>
<input class="w-12 h-14 text-center font-headline-lg text-headline-lg rounded-xl bg-surface-container-high border-2 border-transparent text-on-surface otp-input focus:border-soft-teal transition-colors" inputmode="numeric" maxlength="1" pattern="[0-9]*" readonly="" type="text" value="3"/>
<input class="w-12 h-14 text-center font-headline-lg text-headline-lg rounded-xl bg-surface-container-high border-2 border-transparent text-on-surface otp-input focus:border-soft-teal transition-colors" inputmode="numeric" maxlength="1" pattern="[0-9]*" readonly="" type="text" value="8"/>
<input class="w-12 h-14 text-center font-headline-lg text-headline-lg rounded-xl bg-surface-container-high border-2 border-transparent text-on-surface otp-input focus:border-soft-teal transition-colors" inputmode="numeric" maxlength="1" pattern="[0-9]*" readonly="" type="text" value="4"/>
<input class="w-12 h-14 text-center font-headline-lg text-headline-lg rounded-xl bg-surface-container-high border-2 border-transparent text-on-surface otp-input focus:border-soft-teal transition-colors" inputmode="numeric" maxlength="1" pattern="[0-9]*" readonly="" type="text" value="9"/>
<input autofocus="" class="w-12 h-14 text-center font-headline-lg text-headline-lg rounded-xl bg-surface-container-high border-2 border-transparent text-on-surface otp-input otp-error focus:border-soft-teal transition-colors" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text" value="2"/>
</div>
<!-- Error Message -->
<div class="flex items-center gap-1 mt-2 text-error" id="error-message">
<span class="material-symbols-outlined text-sm">error</span>
<span class="font-label-sm text-label-sm">验证码错误，请重新输入</span>
</div>
</div>
<!-- Resend Action -->
<div class="flex justify-center mt-4">
<button class="font-label-md text-label-md text-on-surface-variant opacity-50 cursor-not-allowed flex items-center justify-center px-4 py-2 rounded-full bg-surface-container-low" disabled="">
                    59s 后重发
                </button>
</div>
<div class="mt-auto pt-8">
<button class="w-full bg-warm-orange text-on-primary font-label-md text-label-md py-4 rounded-full shadow-[0_8px_24px_rgba(255,138,92,0.15)] active:scale-95 transition-transform opacity-70 cursor-not-allowed">
                    登录
               </button>
</div>
</main>
<!-- Custom Numeric Keyboard (Simulated) -->
<div class="absolute bottom-0 left-0 w-full bg-surface-container pb-safe pt-2 px-2 z-40 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] rounded-t-2xl">
<div class="grid grid-cols-3 gap-2 p-2">
<button class="keyboard-key h-12 rounded-lg font-headline-lg text-headline-lg text-on-surface flex items-center justify-center">1</button>
<button class="keyboard-key h-12 rounded-lg font-headline-lg text-headline-lg text-on-surface flex items-center justify-center">2</button>
<button class="keyboard-key h-12 rounded-lg font-headline-lg text-headline-lg text-on-surface flex items-center justify-center">3</button>

<button class="keyboard-key h-12 rounded-lg font-headline-lg text-headline-lg text-on-surface flex items-center justify-center">5</button>
<button class="keyboard-key h-12 rounded-lg font-headline-lg text-headline-lg text-on-surface flex items-center justify-center">6</button>
<button class="keyboard-key h-12 rounded-lg font-headline-lg text-headline-lg text-on-surface flex items-center justify-center">7</button>
<button class="keyboard-key h-12 rounded-lg font-headline-lg text-headline-lg text-on-surface flex items-center justify-center">8</button>
<button class="keyboard-key h-12 rounded-lg font-headline-lg text-headline-lg text-on-surface flex items-center justify-center">9</button>
<button class="bg-transparent h-12 rounded-lg flex items-center justify-center"></button>
<button class="keyboard-key h-12 rounded-lg font-headline-lg text-headline-lg text-on-surface flex items-center justify-center">0</button>
<button class="keyboard-key h-12 rounded-lg text-on-surface flex items-center justify-center bg-surface-container-high">
<span class="material-symbols-outlined">backspace</span>
</button>
</div>
</div>
</div>
<script>
        // Simple script to demonstrate focusing next input (though readonly in this static demo)
        const inputs = document.querySelectorAll('.otp-input');
        
        // Simulate error state shake reset
        setTimeout(() => {
            document.querySelectorAll('.otp-error').forEach(el => {
                el.classList.remove('otp-error');
            });
            const errorMsg = document.getElementById('error-message');
            if(errorMsg) errorMsg.style.opacity = '0.5'; // Fade out slightly after shake
        }, 1000);
    </script>
