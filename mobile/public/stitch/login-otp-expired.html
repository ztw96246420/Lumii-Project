<body class="antialiased min-h-screen flex flex-col items-center justify-start w-full md:hidden">
<!-- Top Navigation (Transactional - minimal) -->
<header class="w-full h-16 flex items-center px-margin-mobile justify-start sticky top-0 z-50 bg-background/80 backdrop-blur-xl">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors scale-95 active:scale-90">
<span class="material-symbols-outlined text-bark-gray text-2xl" data-icon="arrow_back">arrow_back</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="w-full flex-1 flex flex-col px-margin-mobile pt-8 pb-20 max-w-md mx-auto">
<!-- Header Text -->
<div class="flex flex-col gap-base mb-10">
<h1 class="font-headline-xl text-headline-xl text-on-surface">输入验证码</h1>
<p class="font-body-md text-body-md text-bark-gray">验证码已发送至您的手机</p>
</div>
<!-- Verification Input Section -->
<div class="flex flex-col gap-6 w-full">
<!-- Code Inputs -->
<div class="flex justify-between items-center w-full gap-2">
<input class="code-input w-12 h-14 bg-surface-container-low border border-error rounded-lg text-center font-headline-lg text-headline-lg text-on-surface shadow-sm focus:bg-surface transition-all" maxlength="1" type="number" value="4"/>
<input class="code-input w-12 h-14 bg-surface-container-low border border-error rounded-lg text-center font-headline-lg text-headline-lg text-on-surface shadow-sm focus:bg-surface transition-all" maxlength="1" type="number" value="2"/>
<input class="code-input w-12 h-14 bg-surface-container-low border border-error rounded-lg text-center font-headline-lg text-headline-lg text-on-surface shadow-sm focus:bg-surface transition-all" maxlength="1" type="number" value="0"/>
<input class="code-input w-12 h-14 bg-surface-container-low border border-error rounded-lg text-center font-headline-lg text-headline-lg text-on-surface shadow-sm focus:bg-surface transition-all" maxlength="1" type="number" value="8"/>
<input class="code-input w-12 h-14 bg-surface-container-low border border-error rounded-lg text-center font-headline-lg text-headline-lg text-on-surface shadow-sm focus:bg-surface transition-all" maxlength="1" type="number" value="9"/>
<input autofocus="" class="code-input w-12 h-14 bg-surface-container-low border border-error rounded-lg text-center font-headline-lg text-headline-lg text-error shadow-sm focus:bg-surface transition-all animate-pulse" maxlength="1" type="number" value="3"/>
</div>
<!-- Error Message -->
<div class="flex items-center gap-2 text-error px-2">
<span class="material-symbols-outlined text-sm" data-icon="error">error</span>
<p class="font-label-md text-label-md">验证码已过期，请重新获取</p>
</div>
</div>
<!-- Actions -->
<div class="mt-auto flex flex-col gap-4 w-full pb-8">
<button class="w-full text-on-surface-variant font-label-md text-label-md py-4 rounded-full flex items-center justify-center shadow-none bg-secondary-container">重新获取验证码</button>
<button class="w-full text-on-primary font-label-md text-label-md py-4 rounded-full flex items-center justify-center shadow-[0px_8px_24px_rgba(255,138,92,0.15)] scale-98 active:scale-95 transition-all duration-200 opacity-50 bg-surface-container-high" disabled="">验证</button>
</div>
</main>
<script>
        // Simple script to auto-focus next input (visual demo only)
        const inputs = document.querySelectorAll('.code-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', function() {
                if (this.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && this.value.length === 0 && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
    </script>
