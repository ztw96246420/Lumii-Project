<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
            font-family: 'Plus Jakarta Sans', sans-serif;
            overscroll-behavior-y: none;
        }
        
        /* Hide scrollbar for clean UI */
        ::-webkit-scrollbar {
            display: none;
        }
        
        .chat-container {
            height: calc(100vh - 140px); /* Adjust for header and input area */
            padding-bottom: 20px;
        }

        /* Organic bubble shapes */
        .bubble-pet {
            border-radius: 20px 20px 20px 4px;
            box-shadow: 0px 4px 20px rgba(74, 69, 66, 0.05);
        }
        
        .bubble-user {
            border-radius: 20px 20px 4px 20px;
            box-shadow: 0px 4px 20px rgba(255, 138, 92, 0.15);
        }
        
        /* Subtle animation for the status indicator */
        @keyframes pulse-status {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
        .status-dot {
            animation: pulse-status 2s infinite ease-in-out;
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">
<!-- Top Navigation Bar (Chat Specific) -->
<header class="fixed top-0 w-full z-50 bg-surface/90 backdrop-blur-md h-20 px-margin-mobile flex items-center justify-between shadow-[0_1px_0_0_rgba(0,0,0,0.05)]">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-surface-variant transition-colors active:scale-95 text-on-surface">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex flex-col items-center flex-1 mx-4">
<div class="flex items-center gap-2">
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-surface-container bg-surface-container-high shadow-sm">
<img alt="Mochi Avatar" class="w-full h-full object-cover object-top" src="https://lh3.googleusercontent.com/aida/ADBb0uimVPuenXN93cfkShpzu66CkAtJlfRD8NC5-Hr6pXWI4MNuYMa3f9tt1xbdp1k3YwB0QNSTZ1zO5U2SrLpFc8p1WTj9IgwZ4ryMF9hUTnilnSARj_SOgaJhfWCZyHsHbFv832Rn66LDHp8KaCUVhZTanvLo6IqQUXvDS1kTjvgIgfLVIAkWwFUHk6w22Ot1iG8-3DyvOmMSkvhZssrgNjtxEyhrCV30YI4x2TVI5LxkcOtmAdkSLHT4tUQ8"/>
</div>
<div class="flex flex-col">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Mochi</h1>
<div class="flex items-center gap-1">
<div class="w-2 h-2 rounded-full bg-soft-teal status-dot"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant">&#x5f00;&#x5fc3;&#xff0c;&#x968f;&#x65f6;&#x60f3;&#x804a;&#x5929;</span>
</div>
</div>
</div>
</div>
<button class="flex items-center justify-center p-2 rounded-full hover:bg-surface-variant transition-colors active:scale-95 text-on-surface">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</header>
<!-- Chat Body -->
<main class="flex-1 overflow-y-auto mt-20 pt-4 px-margin-mobile chat-container flex flex-col gap-6">
<!-- Timestamp -->
<div class="flex justify-center">
<span class="font-label-sm text-label-sm text-outline px-3 py-1 bg-surface-container-high rounded-full opacity-80">&#x4eca;&#x5929; 10:30</span>
</div>
<!-- Pet Message -->
<div class="flex items-start gap-3 w-full max-w-[85%]">
<div class="w-8 h-8 rounded-full overflow-hidden flex-shrink-0 bg-surface-container shadow-sm border border-surface-variant">
<img alt="Mochi" class="w-full h-full object-cover object-top" src="https://lh3.googleusercontent.com/aida/ADBb0uimVPuenXN93cfkShpzu66CkAtJlfRD8NC5-Hr6pXWI4MNuYMa3f9tt1xbdp1k3YwB0QNSTZ1zO5U2SrLpFc8p1WTj9IgwZ4ryMF9hUTnilnSARj_SOgaJhfWCZyHsHbFv832Rn66LDHp8KaCUVhZTanvLo6IqQUXvDS1kTjvgIgfLVIAkWwFUHk6w22Ot1iG8-3DyvOmMSkvhZssrgNjtxEyhrCV30YI4x2TVI5LxkcOtmAdkSLHT4tUQ8"/>
</div>
<div class="bubble-pet bg-surface-container-lowest border border-surface-variant p-4 text-on-surface font-body-md text-body-md relative group">
                喵~ 早上好！我今天感觉特别有活力，你想和我玩一会儿吗？ 🐾
            </div>
</div>
<!-- User Message -->
<div class="flex flex-col items-end gap-1 w-full self-end">
<div class="bubble-user bg-primary-container text-on-primary-container p-4 font-body-md text-body-md max-w-[85%]">
                早上好，Mochi！今天你想做点什么？
            </div>
<span class="font-label-sm text-label-sm text-outline-variant mr-1">&#x5df2;&#x8bfb; 10:32</span>
</div>
<!-- Pet Message -->
<div class="flex items-start gap-3 w-full max-w-[85%]">
<div class="w-8 h-8 rounded-full overflow-hidden flex-shrink-0 bg-surface-container shadow-sm border border-surface-variant">
<img alt="Mochi" class="w-full h-full object-cover object-top" src="https://lh3.googleusercontent.com/aida/ADBb0uimVPuenXN93cfkShpzu66CkAtJlfRD8NC5-Hr6pXWI4MNuYMa3f9tt1xbdp1k3YwB0QNSTZ1zO5U2SrLpFc8p1WTj9IgwZ4ryMF9hUTnilnSARj_SOgaJhfWCZyHsHbFv832Rn66LDHp8KaCUVhZTanvLo6IqQUXvDS1kTjvgIgfLVIAkWwFUHk6w22Ot1iG8-3DyvOmMSkvhZssrgNjtxEyhrCV30YI4x2TVI5LxkcOtmAdkSLHT4tUQ8"/>
</div>
<div class="bubble-pet bg-surface-container-lowest border border-surface-variant p-4 text-on-surface font-body-md text-body-md">
                我想吃点零食，然后听你讲个故事！或者我们可以记录一下今天的健康状况？
            </div>
</div>
</main>
<!-- Bottom Input Area (Fixed) -->
<div class="fixed bottom-0 w-full bg-surface-bright/95 backdrop-blur-lg border-t border-surface-container shadow-[0_-4px_20px_rgba(74,69,66,0.05)] z-40 pb-safe">
<!-- Quick Actions Horizontal Scroll -->
<div class="flex overflow-x-auto gap-2 px-margin-mobile py-3 no-scrollbar border-b border-surface-container-low">
<button class="whitespace-nowrap px-4 py-2 bg-surface-container-high hover:bg-surface-variant text-on-surface font-label-md text-label-md rounded-full transition-colors flex items-center gap-1 active:scale-95">
<span class="material-symbols-outlined text-[18px]" data-icon="restaurant">restaurant</span>
                &#x4eca;&#x5929;&#x5403;&#x4ec0;&#x4e48;&#xff1f;
            </button>
<button class="whitespace-nowrap px-4 py-2 bg-secondary-container hover:opacity-90 text-on-secondary-container font-label-md text-label-md rounded-full transition-opacity flex items-center gap-1 active:scale-95 shadow-sm">
<span class="material-symbols-outlined text-[18px]" data-icon="favorite">favorite</span>
                &#x5065;&#x5eb7;&#x68c0;&#x67e5;
            </button>
<button class="whitespace-nowrap px-4 py-2 bg-surface-container-high hover:bg-surface-variant text-on-surface font-label-md text-label-md rounded-full transition-colors flex items-center gap-1 active:scale-95">
<span class="material-symbols-outlined text-[18px]" data-icon="auto_stories">auto_stories</span>

<!-- Text Input Row -->
<div class="flex items-center gap-2 px-margin-mobile py-3">
<button class="p-2.5 text-on-surface-variant hover:text-primary transition-colors active:scale-90 rounded-full bg-surface-container">
<span class="material-symbols-outlined" data-icon="add_photo_alternate">add_photo_alternate</span>
</button>
<div class="flex-1 relative">
<input class="w-full bg-surface-container-high border border-surface-variant focus:border-soft-teal focus:ring-1 focus:ring-soft-teal rounded-full py-3 px-5 font-body-md text-body-md text-on-surface placeholder-outline-variant transition-all outline-none" placeholder="给 Mochi 发消息..." type="text"/>
</div>
<button class="p-3 bg-warm-orange text-white rounded-full shadow-md hover:bg-primary transition-colors active:scale-95 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="mic" data-weight="fill">mic</span>
</button>
</div>
</div>
</body></html>
