<script>
        const bottomSheet = document.getElementById('bottomSheet');
        const scrim = document.getElementById('scrim');
        const editArea = document.getElementById('editArea');
        const editBtn = document.getElementById('editBtn');
        const toast = document.getElementById('toast');

        function openBottomSheet() {
            scrim.classList.remove('opacity-0', 'pointer-events-none');
            bottomSheet.classList.remove('translate-y-full');
            // Reset state
            editArea.classList.add('hidden');
            editBtn.classList.remove('bg-surface-container-highest', 'border-transparent', 'text-on-surface');
            editBtn.innerHTML = '<span class="material-symbols-outlined" data-icon="edit">edit</span> Edit';
        }

        function closeBottomSheet() {
            scrim.classList.add('opacity-0', 'pointer-events-none');
            bottomSheet.classList.add('translate-y-full');
        }

        function toggleEdit() {
            if (editArea.classList.contains('hidden')) {
                editArea.classList.remove('hidden');
                editBtn.classList.add('bg-surface-container-highest', 'border-transparent', 'text-on-surface');
                editBtn.classList.remove('border-soft-teal', 'text-secondary', 'bg-secondary-container/10');
                editBtn.innerHTML = '&#x53d6;&#x6d88;';
            } else {
                editArea.classList.add('hidden');
                editBtn.classList.remove('bg-surface-container-highest', 'border-transparent', 'text-on-surface');
                editBtn.classList.add('border-soft-teal', 'text-secondary', 'bg-secondary-container/10');
                editBtn.innerHTML = '<span class="material-symbols-outlined" data-icon="edit">edit</span> Edit';
            }
        }

        function sendHello() {
            closeBottomSheet();
            setTimeout(() => {
                showToast();
            }, 300);
        }

        function showToast() {
            toast.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-[-20px]');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'pointer-events-none', 'translate-y-[-20px]');
            }, 3000);
        }

        // Initialize Material Symbols
        document.querySelectorAll('[data-icon]').forEach(el => {
            el.textContent = el.getAttribute('data-icon');
        });
    </script>
