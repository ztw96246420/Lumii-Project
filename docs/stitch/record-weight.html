<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col antialiased selection:bg-warm-orange selection:text-white">
<!-- Top App Bar (Task-Focused: Needs Back Button, No Nav Shell) -->
<header class="flex justify-between items-center px-margin-mobile h-16 w-full max-w-7xl mx-auto docked full-width top-0 sticky z-50 backdrop-blur-xl bg-background/80 dark:bg-background/80 flat no shadows text-primary dark:text-primary-fixed">

<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>

<h1 class="font-headline-lg-mobile text-headline-lg-mobile dark:text-on-surface">记录体重</h1>
<div class="w-10 h-10"></div> <!-- Placeholder for balance -->
</header>
<main class="flex-1 w-full max-w-md mx-auto px-margin-mobile pb-[100px] flex flex-col gap-gutter mt-4">
<!-- Weight Display & Input -->
<section class="bg-surface-container-lowest rounded-xl p-6 flex flex-col items-center justify-center relative overflow-hidden shadow-[0px_4px_20px_rgba(74,69,66,0.05)] border border-surface-variant">
<!-- Decorative soft blob -->
<div class="absolute -top-10 -right-10 w-32 h-32 bg-primary-container opacity-20 rounded-full blur-2xl"></div>
<h2 class="font-label-sm text-label-sm text-bark-gray uppercase tracking-wider mb-2">当前体重</h2>
<div class="flex items-baseline gap-1 relative z-10">
<span class="font-headline-xl text-headline-xl text-on-surface text-5xl" id="weightDisplay">4.5</span>
<span class="font-body-lg text-body-lg text-bark-gray ml-1">kg</span>
</div>
<!-- Last Record Reference -->
<div class="mt-4 flex items-center gap-2 bg-surface-container py-1.5 px-3 rounded-full">
<span class="material-symbols-outlined text-[16px] text-soft-teal" data-icon="history">history</span>
<span class="font-label-sm text-label-sm text-bark-gray">上次记录: 4.2 kg (10月12日)</span>
<span class="material-symbols-outlined text-[16px] text-primary" data-icon="trending_up">trending_up</span>
</div>
</section>
<!-- Notes Area -->
<section class="bg-surface-container-lowest rounded-xl p-4 shadow-[0px_4px_20px_rgba(74,69,66,0.05)] border border-surface-variant">
<label class="font-label-md text-label-md text-on-surface flex items-center gap-2 mb-2" for="notes">
<span class="material-symbols-outlined text-[18px] text-bark-gray" data-icon="edit_note">edit_note</span>
                备注信息
            </label>
<textarea class="w-full bg-surface-container-low border-none rounded-lg p-3 font-body-md text-body-md text-on-surface focus:ring-2 focus:ring-soft-teal resize-none placeholder:text-bark-gray/50" id="notes" placeholder="例如：换了新粮，最近运动量减少..." rows="2"></textarea>
</section>
<!-- Custom Numpad -->
<section class="mt-auto grid grid-cols-3 gap-3">
<!-- Row 1 -->
<button class="numpad-btn h-14 bg-surface-container-lowest rounded-xl font-headline-lg-mobile text-headline-lg-mobile text-on-surface shadow-[0px_4px_20px_rgba(74,69,66,0.05)] active:scale-95 transition-transform">1</button>
<button class="numpad-btn h-14 bg-surface-container-lowest rounded-xl font-headline-lg-mobile text-headline-lg-mobile text-on-surface shadow-[0px_4px_20px_rgba(74,69,66,0.05)] active:scale-95 transition-transform">2</button>
<button class="numpad-btn h-14 bg-surface-container-lowest rounded-xl font-headline-lg-mobile text-headline-lg-mobile text-on-surface shadow-[0px_4px_20px_rgba(74,69,66,0.05)] active:scale-95 transition-transform">3</button>

<button class="numpad-btn h-14 bg-surface-container-lowest rounded-xl font-headline-lg-mobile text-headline-lg-mobile text-on-surface shadow-[0px_4px_20px_rgba(74,69,66,0.05)] active:scale-95 transition-transform">6</button>

<button class="numpad-btn h-14 bg-surface-container-lowest rounded-xl font-headline-lg-mobile text-headline-lg-mobile text-on-surface shadow-[0px_4px_20px_rgba(74,69,66,0.05)] active:scale-95 transition-transform">8</button>
<button class="numpad-btn h-14 bg-surface-container-lowest rounded-xl font-headline-lg-mobile text-headline-lg-mobile text-on-surface shadow-[0px_4px_20px_rgba(74,69,66,0.05)] active:scale-95 transition-transform">9</button>
<!-- Row 4 -->
<button class="numpad-btn h-14 bg-surface-container-lowest rounded-xl font-headline-lg-mobile text-headline-lg-mobile text-on-surface shadow-[0px_4px_20px_rgba(74,69,66,0.05)] active:scale-95 transition-transform">.</button>
<button class="numpad-btn h-14 bg-surface-container-lowest rounded-xl font-headline-lg-mobile text-headline-lg-mobile text-on-surface shadow-[0px_4px_20px_rgba(74,69,66,0.05)] active:scale-95 transition-transform">0</button>
<button class="h-14 bg-surface-container-lowest rounded-xl flex items-center justify-center text-bark-gray shadow-[0px_4px_20px_rgba(74,69,66,0.05)] active:scale-95 transition-transform" id="btnDelete">
<span class="material-symbols-outlined" data-icon="backspace">backspace</span>

        <button class="w-full max-w-md mx-auto block bg-warm-orange text-white py-4 rounded-full font-label-md text-label-md shadow-[0px_8px_24px_rgba(255,138,92,0.15)] active:scale-98 transition-transform flex items-center justify-center gap-2">

            保存记录

    </div>
    <nav class="flex justify-around items-center h-16 bg-surface-container-lowest border-t border-surface-variant">

            <span class="text-label-sm font-label-sm">首页</span>
        </a>

            <span class="material-symbols-outlined">explore</span>
            <span class="text-label-sm font-label-sm">发现</span>
        </a>
        <a href="#" class="flex flex-col items-center gap-1 text-bark-gray hover:text-warm-orange transition-colors">
            <span class="material-symbols-outlined">chat_bubble</span>

        </a>
        <a href="#" class="flex flex-col items-center gap-1 text-bark-gray hover:text-warm-orange transition-colors">

        </a>
    </nav>

<script>
        document.addEventListener('DOMContentLoaded', () => {
            const display = document.getElementById('weightDisplay');
            const numpadBtns = document.querySelectorAll('.numpad-btn');
            const btnDelete = document.getElementById('btnDelete');
            let currentVal = '4.5';

            const updateDisplay = () => {
                display.innerText = currentVal || '0';
            };

            numpadBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const val = btn.innerText;
                    
                    if (val === '.' && currentVal.includes('.')) return;
                    
                    if (currentVal === '0' && val !== '.') {
                        currentVal = val;
                    } else if (currentVal.length < 5) { // max length
                        currentVal += val;
                    }
                    updateDisplay();
                });
            });

            btnDelete.addEventListener('click', () => {
                currentVal = currentVal.slice(0, -1);
                if (currentVal === '') currentVal = '0';
                updateDisplay();
            });
        });
    </script>


</body></html>
