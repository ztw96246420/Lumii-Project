<!DOCTYPE html>

<html lang="zh"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>编辑宠物档案</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed": "#241a00",
                        "on-primary": "#ffffff",
                        "secondary-fixed-dim": "#71d7cd",
                        "on-primary-fixed": "#380d00",
                        "error": "#ba1a1a",
                        "warm-orange": "#FF8A5C",
                        "primary-fixed-dim": "#ffb59a",
                        "on-secondary": "#ffffff",
                        "surface-bright": "#fbf9f4",
                        "on-secondary-fixed-variant": "#00504a",
                        "on-tertiary": "#ffffff",
                        "sunny-yellow": "#FFD966",
                        "secondary-fixed": "#8ef4e9",
                        "on-primary-container": "#732500",
                        "surface-variant": "#e4e2dd",
                        "bone-white": "#F9F7F2",
                        "surface-tint": "#9f4119",
                        "secondary-container": "#8bf1e6",
                        "on-tertiary-fixed-variant": "#574500",
                        "primary": "#9f4119",
                        "on-error-container": "#93000a",
                        "surface-container-highest": "#e4e2dd",
                        "health-red": "#EF5350",
                        "inverse-surface": "#30312e",
                        "on-error": "#ffffff",
                        "tertiary": "#735c00",
                        "bark-gray": "#4A4542",
                        "on-secondary-fixed": "#00201d",
                        "on-primary-fixed-variant": "#7f2b02",
                        "surface-container-high": "#eae8e3",
                        "outline": "#8a726a",
                        "tertiary-fixed-dim": "#e7c353",
                        "surface-container-low": "#f5f3ee",
                        "error-container": "#ffdad6",
                        "outline-variant": "#ddc0b7",
                        "on-surface-variant": "#56423b",
                        "tertiary-fixed": "#ffe088",
                        "on-secondary-container": "#006f67",
                        "surface-dim": "#dbdad5",
                        "on-surface": "#1b1c19",
                        "secondary": "#006a63",
                        "primary-container": "#ff8a5c",
                        "primary-fixed": "#ffdbce",
                        "surface-container-lowest": "#ffffff",
                        "background": "#fbf9f4",
                        "on-tertiary-container": "#4e3d00",
                        "on-background": "#1b1c19",
                        "tertiary-container": "#c9a739",
                        "inverse-primary": "#ffb59a",
                        "soft-teal": "#4DB6AC",
                        "inverse-on-surface": "#f2f1ec",
                        "surface-container": "#f0eee9",
                        "surface": "#fbf9f4"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "20px",
                        "gutter": "16px",
                        "margin-desktop": "40px",
                        "base": "8px",
                        "container-padding": "24px"
                    },
                    "fontFamily": {
                        "label-md": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "headline-xl": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"],
                        "headline-lg-mobile": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-xl": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "headline-lg-mobile": ["20px", { "lineHeight": "28px", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "500" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: theme('colors.bone-white');
            color: theme('colors.on-background');
        }
        .card-shadow {
            box-shadow: 0px 4px 20px rgba(74, 69, 66, 0.05);
        }
        .btn-shadow {
            box-shadow: 0px 8px 24px rgba(255, 138, 92, 0.15);
        }
        .input-focus:focus-within {
            border-color: theme('colors.soft-teal');
            box-shadow: 0 0 0 2px rgba(77, 182, 172, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased min-h-screen flex flex-col pt-16">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 backdrop-blur-md bg-surface/80 flex justify-between items-center px-margin-mobile h-16 max-w-screen-xl mx-auto bg-transparent">
<button class="text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 duration-200 p-2 -ml-2 rounded-full">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary">编辑档案</h1>
<div class="w-10"></div> <!-- Placeholder for balance -->
</header>
<!-- Main Content Canvas -->
<main class="flex-grow px-margin-mobile pb-24 max-w-md mx-auto w-full flex flex-col gap-base">
<!-- Avatar Edit Section -->
<section class="flex flex-col items-center mt-base mb-4">
<div class="relative group cursor-pointer mb-4">
<div class="w-24 h-24 rounded-full overflow-hidden border-4 border-surface shadow-md">
<img alt="Pet Avatar" class="w-full h-full object-cover" data-alt="A close-up portrait of a friendly beagle dog looking directly at the camera with warm, expressive eyes. The background is softly blurred to emphasize the pet. The overall aesthetic is bright, warm, and inviting, matching the modern tactile minimalism style with a soft, natural lighting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuATK13i4UYiVAA3YdtimjkK6O_ife1W6p9tUODBPOI-jWhhdybGPWeRv9d8xekLAY_ZyDlHGQJPyxVpWry91YthbMolWhVJnLqQWu8ph6IWd6IvR7FD0Fb3ZPVrV30Vv2wgwsYQsj0Zb4_WD6253heAOIfhgsppeN7yw_NWDrX5kRpZXtAck4bj0Xk-vyky63is_EDNyAegLbbcTyEOZtqFlfJlr7eASwpgoxkZr_foGNlaHJwYM4HW9B40sE8i_IPVFYEa_8beb_OF"/>
</div>
<div class="absolute bottom-0 right-0 bg-warm-orange text-on-primary rounded-full p-1.5 shadow-sm transform translate-x-1 translate-y-1">
<span class="material-symbols-outlined text-[16px]" data-icon="edit">edit</span>
</div>
</div>
<div class="flex bg-surface-container rounded-full p-1">
<button class="px-4 py-1.5 rounded-full bg-white shadow-sm font-label-md text-label-md text-primary">真实照片</button>
<button class="px-4 py-1.5 rounded-full text-on-surface-variant font-label-md text-label-md hover:bg-surface-variant/50 transition-colors">电子伴侣</button>
</div>
</section>
<!-- Form Fields -->
<div class="bg-surface rounded-xl card-shadow p-container-padding flex flex-col gap-gutter">
<!-- Name -->
<div class="flex flex-col gap-1 input-focus rounded-lg transition-all">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1">昵称</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface outline-none" type="text" value="Buddy"/>
</div>
<!-- Species & Breed -->
<div class="grid grid-cols-2 gap-gutter">
<div class="flex flex-col gap-1 input-focus rounded-lg transition-all">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1">物种</label>
<div class="relative">
<select class="w-full bg-surface-container-low border border-outline-variant rounded-lg pl-4 pr-10 py-3 font-body-md text-body-md text-on-surface appearance-none outline-none">
<option>狗狗</option>
<option>猫咪</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="arrow_drop_down">arrow_drop_down</span>
</div>
</div>
<div class="flex flex-col gap-1 input-focus rounded-lg transition-all">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1">品种</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface outline-none" type="text" value="Beagle"/>
</div>
</div>
<!-- Gender & Age -->
<div class="grid grid-cols-2 gap-gutter">
<div class="flex flex-col gap-1 input-focus rounded-lg transition-all">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1">性别</label>
<div class="relative">
<select class="w-full bg-surface-container-low border border-outline-variant rounded-lg pl-4 pr-10 py-3 font-body-md text-body-md text-on-surface appearance-none outline-none">
<option>男孩</option>
<option>女孩</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="arrow_drop_down">arrow_drop_down</span>
</div>
</div>
<div class="flex flex-col gap-1 input-focus rounded-lg transition-all">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1">生日/年龄</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface outline-none" type="text" value="3岁"/>
</div>
</div>
<!-- Weight -->
<div class="flex flex-col gap-1 input-focus rounded-lg transition-all">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1">体重 (kg)</label>
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface outline-none" type="number" value="10.5"/>
</div>
<!-- Personality Tags -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1">性格标签 (多选)</label>
<div class="flex flex-wrap gap-2">
<button class="px-3 py-1.5 rounded-full bg-primary-container/20 text-primary border border-primary/20 font-label-sm text-label-sm">粘人</button>
<button class="px-3 py-1.5 rounded-full bg-surface-container text-on-surface-variant font-label-sm text-label-sm border border-transparent">活泼</button>
<button class="px-3 py-1.5 rounded-full bg-secondary-container/30 text-secondary border border-secondary/20 font-label-sm text-label-sm">贪吃</button>
<button class="px-3 py-1.5 rounded-full bg-surface-container text-on-surface-variant font-label-sm text-label-sm border border-transparent">高冷</button>
<button class="px-3 py-1.5 rounded-full bg-surface-container text-on-surface-variant font-label-sm text-label-sm border border-transparent border-dashed border-outline-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]" data-icon="add">add</span> 自定义
                    </button>
</div>
</div>
<hr class="border-outline-variant/30 my-2"/>
<!-- Social Status -->
<div class="flex flex-col gap-3">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-1">社交状态</label>
<label class="flex items-center gap-3 p-3 rounded-lg border border-outline-variant bg-surface-container-low cursor-pointer hover:bg-surface-container transition-colors">
<input checked="" class="text-warm-orange focus:ring-warm-orange w-5 h-5 border-outline" name="social" type="radio"/>
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-surface">开放线下交友</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">允许附近的伙伴发现我们</span>
</div>
</label>
<label class="flex items-center gap-3 p-3 rounded-lg border border-transparent bg-surface-container-lowest cursor-pointer hover:bg-surface-container transition-colors">
<input class="text-warm-orange focus:ring-warm-orange w-5 h-5 border-outline" name="social" type="radio"/>
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-surface">仅限线上交流</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">保持低调，仅展示数字名片</span>
</div>
</label>
</div>
</div>
</main>
<!-- Bottom Actions (Sticky) -->
<div class="fixed bottom-0 w-full bg-surface/90 backdrop-blur-md border-t border-surface-variant/50 p-4 pb-safe flex gap-4 max-w-md left-1/2 -translate-x-1/2 z-40">
<button class="flex-1 py-3.5 rounded-full border-2 border-soft-teal text-secondary font-label-md text-label-md hover:bg-secondary-container/10 transition-colors active:scale-95 duration-200">
            取消
        </button>
<button class="flex-[2] py-3.5 rounded-full bg-warm-orange text-on-primary font-label-md text-label-md btn-shadow hover:opacity-90 transition-all active:scale-[0.98] duration-200">
            保存修改
        </button>
</div>
</body></html>
