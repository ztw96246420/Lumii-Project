<style>
        body { background-color: theme('colors.background'); }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0px 4px 20px rgba(74, 69, 66, 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="text-on-background min-h-screen pb-24">
<!-- TopAppBar -->
<header class="docked full-width top-0 sticky z-50 backdrop-blur-xl bg-background/80 flex justify-between items-center px-margin-mobile h-16 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-3">
<img alt="用户头像" class="w-8 h-8 rounded-full border-2 border-bone-white shadow-sm" data-alt="A small circular avatar showing a friendly dog face illustration in a soft, modern cartoon style. The color palette is warm, featuring light oranges and soft creams." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDijnHj8o40ZszjX3gRmjXijoJ5iKFz1QyQr_xFV-wiEaRGhH3PkX7ema0yWH7OqXkT96Wr6bjVfqg7gb4YZj1jQ1trZ5l15GDXL2ZRUG2waBjcsXR_pjB6y1mhJTWek2GcMHlVC16p_dJNjryERnP6qXKWiblp5aBICqjqFr40Z8yyW27_TeRP0PNd6lzGhEQbM7fDg8fHCRP5Yshep_yAX00NU6w-TiY8XPCQ_ebsgEDEHWY6O8bzQYXe03EmCCmeyySD0YtiJ0aN"/>
</div>
<h1 class="font-headline-xl text-headline-xl text-warm-orange tracking-tight">Lumii</h1>
<button class="scale-95 active:scale-90 transition-transform duration-200 text-primary hover:bg-surface-container rounded-full p-2">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</header>
<!-- Main Content -->
<main class="max-w-2xl mx-auto px-margin-mobile pt-6">
<!-- Header Section -->
<div class="flex justify-between items-end mb-6">
<div>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-bark-gray">消息中心</h2>
<p class="font-body-md text-body-md text-outline mt-1">您有 4 条未读消息</p>
</div>
<button class="font-label-md text-label-md text-soft-teal hover:bg-soft-teal/10 px-3 py-1.5 rounded-full transition-colors flex items-center gap-1">
<span class="material-symbols-outlined text-[18px]">done_all</span>
                全部标为已读
            </button>
</div>
<!-- Notifications List -->
<div class="space-y-4">
<!-- Greeting Notification -->
<div class="glass-card rounded-xl p-4 flex gap-4 items-start relative overflow-hidden group cursor-pointer transition-transform hover:-translate-y-1">
<div class="absolute left-0 top-0 bottom-0 w-1 bg-warm-orange rounded-l-xl"></div>
<div class="w-12 h-12 rounded-full bg-warm-orange/10 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-warm-orange" data-weight="fill" style="font-variation-settings: 'FILL' 1;">waving_hand</span>
</div>
<div class="flex-1">
<div class="flex justify-between items-start">
<h3 class="font-label-md text-label-md text-bark-gray">新好友请求</h3>
<span class="font-label-sm text-label-sm text-outline">10分钟前</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">"小白"的主人想添加您为好友，一起遛狗吧！</p>
<div class="flex gap-2 mt-3">
<button class="bg-warm-orange text-white font-label-md text-label-md px-4 py-1.5 rounded-full shadow-md shadow-warm-orange/20 active:scale-95 transition-transform">接受</button>
<button class="bg-surface-container text-bark-gray font-label-md text-label-md px-4 py-1.5 rounded-full active:scale-95 transition-transform">忽略</button>
</div>
</div>
</div>
<!-- Health Notification -->
<div class="glass-card rounded-xl p-4 flex gap-4 items-start relative overflow-hidden group cursor-pointer transition-transform hover:-translate-y-1">
<div class="absolute left-0 top-0 bottom-0 w-1 bg-health-red rounded-l-xl"></div>
<div class="w-12 h-12 rounded-full bg-health-red/10 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-health-red" data-weight="fill" style="font-variation-settings: 'FILL' 1;">vaccines</span>
</div>
<div class="flex-1">
<div class="flex justify-between items-start">
<h3 class="font-label-md text-label-md text-bark-gray">健康提醒</h3>
<span class="font-label-sm text-label-sm text-outline">2小时前</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">您的宠物还有 <strong class="text-health-red">2天</strong> 需要接种年度狂犬疫苗，请及时安排。</p>
</div>
</div>
<!-- AI Notification -->
<div class="glass-card rounded-xl p-4 flex gap-4 items-start relative overflow-hidden group cursor-pointer transition-transform hover:-translate-y-1">
<div class="absolute left-0 top-0 bottom-0 w-1 bg-soft-teal rounded-l-xl"></div>
<div class="w-12 h-12 rounded-full bg-soft-teal/10 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-soft-teal" data-weight="fill" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<div class="flex-1">
<div class="flex justify-between items-start">
<h3 class="font-label-md text-label-md text-bark-gray">AI 助手</h3>
<span class="font-label-sm text-label-sm text-outline">昨天</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">您定制的专属宠物 3D 头像已生成完毕，快来看看吧！</p>
<div class="mt-3 w-16 h-16 rounded-lg overflow-hidden border border-outline-variant/30">
<img alt="Generated Avatar Preview" class="w-full h-full object-cover" data-alt="A stylized, modern 3D cartoon rendering of a happy dog's face. The dog has soft, rounded features, big expressive eyes, and a warm, friendly expression. The lighting is soft and inviting, emphasizing the tactile, organic feel of the design system." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC78Gb-c3gE8JRLgTAMt3WWAC2V1rLYVyh7_kNwzPnVe-RSJFr9A8H1vNwnHnS3jl5RgIMyCNwpqriEb5JU_TOpMz0YPnaOmdCaSItNM10BLRWWaukOXXLIscd1Nz3Y3uXrz0jf3oJ_6kxQ1fG1KOfekfoeJhIeMUvlm9tYbvQNdFXGU77cqphIw7Toub2RgVcHyFh6HLaUiF_EdVUSxRvBC88rS8duiDWu6PasFnzfWYRbC5hlpG-kOiI9Xd79lAQwg9CCZdbFp0SA"/>
</div>
</div>
</div>
<!-- System Notification -->
<div class="glass-card rounded-xl p-4 flex gap-4 items-start relative overflow-hidden group cursor-pointer transition-transform hover:-translate-y-1">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-bark-gray" data-weight="fill" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
<div class="flex-1">
<div class="flex justify-between items-start">
<h3 class="font-label-md text-label-md text-bark-gray">系统通知</h3>
<span class="font-label-sm text-label-sm text-outline">昨天</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">您提交的地点评价 "阳光公园宠物区" 已通过审核并发布。</p>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="md:hidden fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-4 pt-2 bg-background/90 backdrop-blur-xl border-t border-outline-variant/30 z-50 rounded-t-xl shadow-lg">
<button class="flex flex-col items-center justify-center text-bark-gray px-4 py-1.5 hover:bg-surface-container-high rounded-full scale-98 active:scale-95 transition-all duration-200 ease-out">
<span class="material-symbols-outlined mb-1">pets</span>
<span class="font-label-sm text-label-sm">&#x5ba0;&#x7269;</span>
</button>
<button class="flex flex-col items-center justify-center text-bark-gray px-4 py-1.5 hover:bg-surface-container-high rounded-full scale-98 active:scale-95 transition-all duration-200 ease-out">
<span class="material-symbols-outlined mb-1">explore</span>
<span class="font-label-sm text-label-sm">&#x53d1;&#x73b0;</span>
</button>
<button class="flex flex-col items-center justify-center text-bark-gray px-4 py-1.5 hover:bg-surface-container-high rounded-full scale-98 active:scale-95 transition-all duration-200 ease-out">
<span class="material-symbols-outlined mb-1">map</span>
<span class="font-label-sm text-label-sm">&#x5730;&#x56fe;</span>
</button>
<!-- Active Tab -->
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-4 py-1.5 transition-all duration-300 scale-98 active:scale-95 ease-out relative">
<span class="absolute top-1 right-3 w-2 h-2 bg-health-red rounded-full"></span>
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
<span class="font-label-sm text-label-sm">&#x6d88;&#x606f;</span>
</button>
<button class="flex flex-col items-center justify-center text-bark-gray px-4 py-1.5 hover:bg-surface-container-high rounded-full scale-98 active:scale-95 transition-all duration-200 ease-out">
<span class="material-symbols-outlined mb-1">person</span>
<span class="font-label-sm text-label-sm">&#x6211;&#x7684;</span>
</button>
</nav>
