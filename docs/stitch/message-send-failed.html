<!-- Interactive Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const errorBtn = document.getElementById('error-btn');
            const errorMenu = document.getElementById('error-menu');
            let isMenuOpen = false;

            // Toggle menu on button click
            errorBtn.addEventListener('click', (e) => {
                e.stopPropagation(); // Prevent closing immediately
                isMenuOpen = !isMenuOpen;
                if (isMenuOpen) {
                    errorMenu.classList.remove('hidden');
                    // Slight delay for transition to apply after display:block
                    setTimeout(() => {
                        errorMenu.classList.remove('opacity-0', 'scale-95');
                        errorMenu.classList.add('opacity-100', 'scale-100');
                    }, 10);
                } else {
                    closeMenu();
                }
            });

            // Close menu when clicking outside
            document.addEventListener('click', (e) => {
                if (isMenuOpen && !errorMenu.contains(e.target)) {
                    closeMenu();
                }
            });

            function closeMenu() {
                errorMenu.classList.remove('opacity-100', 'scale-100');
                errorMenu.classList.add('opacity-0', 'scale-95');
                // Wait for transition to finish before hiding
                setTimeout(() => {
                    errorMenu.classList.add('hidden');
                    isMenuOpen = false;
                }, 200);
            }
        });
    </script>
