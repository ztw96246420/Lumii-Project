server {
    listen 80;
    listen [::]:80;
    server_name api.lumiiapp.cn;

    client_max_body_size 200M;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_connect_timeout 15s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Keep the media CDN's current HTTP origin working during bootstrap while
# preventing the default vhost from exposing the full backend on this Host.
server {
    listen 80;
    listen [::]:80;
    server_name media.lumiiapp.cn;

    server_tokens off;
    client_max_body_size 1m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    location ^~ /storage/objects/ {
        limit_except GET HEAD OPTIONS {
            deny all;
        }

        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_connect_timeout 15s;
        proxy_send_timeout 30s;
        proxy_read_timeout 180s;
        proxy_set_header Connection "";
        proxy_set_header Host media.lumiiapp.cn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Host media.lumiiapp.cn;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Authorization "";
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_hide_header X-Powered-By;
    }

    location ~ ^/media/uploads/[^/]+/file$ {
        limit_except GET HEAD OPTIONS {
            deny all;
        }

        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_connect_timeout 15s;
        proxy_send_timeout 30s;
        proxy_read_timeout 180s;
        proxy_set_header Connection "";
        proxy_set_header Host media.lumiiapp.cn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Host media.lumiiapp.cn;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Authorization "";
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_hide_header X-Powered-By;
    }

    location / {
        return 404;
    }
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 200M;

    location /downloads/ {
        alias /var/www/lumii-downloads/;
        autoindex off;
        types {
            application/vnd.android.package-archive apk;
        }
        default_type application/octet-stream;
        add_header Cache-Control "no-store";
    }

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_connect_timeout 15s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
