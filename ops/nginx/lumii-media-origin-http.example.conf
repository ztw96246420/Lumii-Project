# Optional later hardening for the current HTTP origin. This listener is not a
# launch prerequisite; ops/nginx/lumii.conf already contains the deployable
# media.lumiiapp.cn:80 exact vhost.
#
# Use this only when the CDN has been migrated to a custom origin port. Copy it
# to an enabled Nginx configuration after adding the current, verified CDN
# origin-source CIDRs below and restricting TCP/8081 to the same CIDRs in the
# cloud security group/firewall. The default is deliberately fail-closed: only
# loopback can reach this listener.
#
# Configure the CDN origin as:
#   address: <origin IP>
#   protocol: HTTP
#   port: 8081
#   Host header: media.lumiiapp.cn (or media-origin.lumiiapp.cn)

server {
    listen 8081 default_server;
    server_name _;

    # A CDN origin request must send one of the explicit Host values below.
    return 444;
}

server {
    listen 8081;
    server_name media.lumiiapp.cn media-origin.lumiiapp.cn;

    server_tokens off;
    client_max_body_size 1m;

    # Add verified CDN origin-source networks ABOVE "deny all". Never trust
    # X-Forwarded-For for this decision; Nginx access rules use $remote_addr.
    allow 127.0.0.1;
    allow ::1;
    # allow <verified-cdn-origin-cidr>;
    deny all;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    location ^~ /storage/objects/ {
        limit_except GET HEAD OPTIONS {
            deny all;
        }

        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_connect_timeout 15s;
        proxy_send_timeout 30s;
        proxy_read_timeout 180s;
        proxy_set_header Connection "";
        proxy_set_header Host media.lumiiapp.cn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Host media.lumiiapp.cn;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Authorization "";
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_hide_header X-Powered-By;
    }

    location ~ ^/media/uploads/[^/]+/file$ {
        limit_except GET HEAD OPTIONS {
            deny all;
        }

        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_connect_timeout 15s;
        proxy_send_timeout 30s;
        proxy_read_timeout 180s;
        proxy_set_header Connection "";
        proxy_set_header Host media.lumiiapp.cn;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Host media.lumiiapp.cn;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Authorization "";
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_hide_header X-Powered-By;
    }

    location / {
        return 404;
    }
}
