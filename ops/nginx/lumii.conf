server {
    listen 80;
    listen [::]:80;
    server_name api.lumiiapp.cn;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://api.lumiiapp.cn$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.lumiiapp.cn;

    ssl_certificate /etc/letsencrypt/live/api.lumiiapp.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.lumiiapp.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:LumiiSSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=15552000" always;

    client_max_body_size 200M;

    location /downloads/ {
        alias /var/www/lumii-downloads/;
        autoindex off;
        types {
            application/vnd.android.package-archive apk;
        }
        default_type application/octet-stream;
        add_header Cache-Control "no-store";
    }

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_connect_timeout 15s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

